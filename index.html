<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Фетхие → Аэропорт Даламан</title>

<style>

body{
font-family:Arial;
background:#f3f5f7;
margin:0;
padding:20px;
text-align:center;
}

.container{
max-width:420px;
margin:auto;
}

h1{
font-size:26px;
margin-bottom:20px;
}

.card{
background:white;
padding:22px;
margin:18px 0;
border-radius:12px;
box-shadow:0 6px 14px rgba(0,0,0,0.1);
}

.company{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.desc{
font-size:14px;
color:#666;
margin-bottom:14px;
}

.route{
background:#eef2f6;
padding:12px;
border-radius:8px;
font-size:15px;
margin-bottom:10px;
}

.button{
display:block;
padding:14px;
border-radius:8px;
text-decoration:none;
color:white;
font-size:18px;
margin-top:10px;
}

.havas{background:#0b3c88;}
.muttas{background:#2e9d45;}

</style>
</head>

<body>

<div class="container">

<h1>🚌 Фетхие → аэропорт Даламан</h1>


<div class="card">

<div class="company">Havaş</div>

<div class="route">
From: <b>Muğla-Fethiye</b><br>
To: <b>Muğla – Dalaman Airport</b>
</div>

<div class="desc">
Выберите этот маршрут и дату
</div>

<a class="button havas"
href="https://www.havas.net/en/bus-services"
target="_blank">
Открыть расписание
</a>

</div>


<div class="card">

<div class="company">MUTTAŞ</div>

<div class="route">
🚌 Отправление: <b>Fethiye Otogar</b>
</div>

<div class="desc">
Автобус автовокзал → аэропорт
</div>

<a class="button muttas"
href="https://ulasim.muttas.com.tr/hat/48-25-fethiye-otogar-dalaman-havalimani-439"
target="_blank">
Открыть расписание
</a>

</div>

</div>

</body>
</html>
